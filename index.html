<div id="adminPanel" style="display:none; position:fixed; top:20px; right:20px; background:var(--panel); border:2px solid var(--accent); padding:20px; border-radius:15px; z-index:2000; backdrop-filter:blur(10px);">
    <h3 style="margin-top:0; color:var(--accent);">Админ-панель</h3>
    <button onclick="adminClear()" style="background:#ef4444; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; width:100%; margin-bottom:10px;">ОЧИСТИТЬ ВСЁ</button>
    <input type="text" id="banNick" placeholder="Ник для бана" style="width:100%; margin-bottom:5px; background:#111; color:white; border:1px solid #444; padding:5px;">
    <button onclick="adminBan()" style="width:100%; padding:8px; cursor:pointer;">Забанить</button>
    <button onclick="closeAdmin()" style="margin-top:10px; background:none; color:#888; border:none; cursor:pointer; width:100%;">Закрыть</button>
</div>

<div id="openAdminBtn" onclick="askAdmin()" style="position:fixed; top:5px; right:5px; width:10px; height:10px; cursor:pointer; opacity:0.1; background:white;"></div>

<script>
    // ... (весь предыдущий код сокетов остается)

    function askAdmin() {
        const login = prompt("Admin Login:");
        const pass = prompt("Admin Pass:");
        socket.emit('admin_login', { login, pass });
    }

    socket.on('admin_success', (success) => {
        if(success) {
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            alert("Неверные данные!");
        }
    });

    function adminClear() {
        if(confirm("Реально всё удалить?")) {
            socket.emit('admin_command', { type: 'clear_all' });
        }
    }

    function adminBan() {
        const user = document.getElementById('banNick').value;
        if(user) {
            socket.emit('admin_command', { type: 'ban_user', user: user });
            alert("Пользователь " + user + " отправлен в бан");
        }
    }

    function closeAdmin() {
        document.getElementById('adminPanel').style.display = 'none';
    }

    socket.on('error_msg', (msg) => alert(msg));
    
    socket.on('stats_update', (data) => {
        // Можно выводить онлайн куда-нибудь
        console.log("Онлайн: " + data.online);
    });
</script>
