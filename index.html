<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Battle Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0b061a; --panel: rgba(20, 15, 35, 0.95); --accent: #a855f7; --text: #f1f5f9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; user-select: none; }
        #authOverlay { position: fixed; inset: 0; background: #020617; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: 0.5s; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 24px; border: 1px solid var(--accent); text-align: center; width: 300px; }
        #viewport { width: 100vw; height: 100vh; cursor: crosshair; }
        #scene { position: absolute; transform-origin: 0 0; }
        canvas { background: white; image-rendering: pixelated; box-shadow: 0 0 50px #000; }
        #historyMenu { position: fixed; display: none; background: var(--panel); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; z-index: 500; pointer-events: none; }
        .ui { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--panel); padding: 10px 25px; border-radius: 100px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--accent); z-index: 100; }
        input[type="color"] { width: 40px; height: 40px; cursor: pointer; border: 2px solid white; border-radius: 50%; background: none; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        #adminPanel { position: fixed; top: 20px; right: 20px; display: none; background: var(--panel); padding: 15px; border: 1px solid red; border-radius: 12px; z-index: 200; }
        .btn { width: 100%; padding: 12px; background: var(--accent); border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <h2 style="color:var(--accent)">Pixel Battle</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()" class="btn">Войти</button>
        <p id="error" style="color: #ef4444; font-size: 12px; margin-top: 10px;"></p>
    </div>
</div>

<div id="adminPanel">
    <h4 style="margin:0 0 10px 0; color:red;">Admin Mode</h4>
    <button onclick="socket.emit('admin_clear')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Очистить доску</button>
</div>

<div id="historyMenu"><div id="historyContent" style="font-size:11px;"></div></div>

<div id="viewport"><div id="scene"><canvas id="canvas"></canvas></div></div>

<div class="ui">
    <div id="coords" style="font-family:monospace; color:var(--accent);">X:0 Y:0</div>
    <input type="color" id="colorPicker" value="#a855f7">
    <div id="myUser" style="font-size:12px; font-weight:bold;">...</div>
</div>

<script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scene = document.getElementById('scene');
    const GRID = 100, P_SIZE = 20;
    canvas.width = canvas.height = GRID * P_SIZE;

    let myNick = "";
    let lastX = -1, lastY = -1;

    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        socket.emit('auth', { username, password });
    }

    socket.on('auth_success', (data) => {
        myNick = data.username;
        document.getElementById('myUser').innerText = myNick;
        document.getElementById('authOverlay').style.opacity = '0';
        setTimeout(() => document.getElementById('authOverlay').remove(), 500);
        if(data.isAdmin) document.getElementById('adminPanel').style.display = 'block';
    });

    socket.on('auth_error', (msg) => {
        document.getElementById('error').innerText = msg;
    });

    socket.on('init_board', (board) => {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let key in board) {
            const [x, y] = key.split(',').map(Number);
            ctx.fillStyle = board[key];
            ctx.fillRect(x * P_SIZE, y * P_SIZE, P_SIZE, P_SIZE);
        }
    });

    socket.on('pixel_update', (data) => {
        ctx.fillStyle = data.color;
        ctx.fillRect(data.x * P_SIZE, data.y * P_SIZE, P_SIZE, P_SIZE);
    });

    socket.on('history_data', (res) => {
        const content = document.getElementById('historyContent');
        content.innerHTML = res.data.length ? res.data.map(h => `
            <div style="margin-bottom:5px;">
                <b style="color:var(--accent)">${h.user}:</b> <span style="color:#888">${h.time}</span>
            </div>
        `).join('') : "Нет истории";
    });

    function paint(cx, cy) {
        if(!myNick) return;
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((cx - rect.left) / (P_SIZE * currentScale));
        const y = Math.floor((cy - rect.top) / (P_SIZE * currentScale));
        if (x >= 0 && x < GRID && y >= 0 && y < GRID && (x !== lastX || y !== lastY)) {
            const color = document.getElementById('colorPicker').value;
            lastX = x; lastY = y;
            socket.emit('paint', { x, y, color });
        }
    }

    // Камера и управление
    let targetScale = 0.6, targetX = window.innerWidth/2 - (canvas.width*0.6)/2, targetY = window.innerHeight/2 - (canvas.height*0.6)/2;
    let currentScale = targetScale, currentX = targetX, currentY = targetY;

    function animate() {
        currentScale += (targetScale - currentScale) * 0.15;
        currentX += (targetX - currentX) * 0.15;
        currentY += (targetY - currentY) * 0.15;
        scene.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
        requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('mousedown', (e) => { 
        if(e.button === 0) paint(e.clientX, e.clientY); 
        document.getElementById('historyMenu').style.display='none';
    });

    window.addEventListener('mousemove', (e) => {
        if(e.buttons === 1) paint(e.clientX, e.clientY);
        if(e.buttons === 4) { targetX += e.movementX; targetY += e.movementY; }
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (P_SIZE * currentScale));
        const y = Math.floor((e.clientY - rect.top) / (P_SIZE * currentScale));
        if (x >= 0 && x < GRID && y >= 0 && y < GRID) document.getElementById('coords').innerText = `X:${x} Y:${y}`;
    });

    window.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (P_SIZE * currentScale));
        const y = Math.floor((e.clientY - rect.top) / (P_SIZE * currentScale));
        if (x >= 0 && x < GRID && y >= 0 && y < GRID) {
            socket.emit('get_history', `${x},${y}`);
            const menu = document.getElementById('historyMenu');
            menu.style.display = 'block';
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
        }
    });

    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.2 : 0.8;
        const sX = (e.clientX - targetX) / targetScale;
        const sY = (e.clientY - targetY) / targetScale;
        targetScale = Math.min(Math.max(0.1, targetScale * delta), 20);
        targetX = e.clientX - sX * targetScale;
        targetY = e.clientY - sY * targetScale;
    }, { passive: false });
</script>
</body>
</html>
