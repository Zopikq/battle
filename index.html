<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Battle 400x400 Database Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0b061a; --panel: rgba(20, 15, 35, 0.95); --accent: #a855f7; --text: #f1f5f9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; user-select: none; }
        #authOverlay { position: fixed; inset: 0; background: #020617; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: 0.5s; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 24px; border: 1px solid var(--accent); text-align: center; width: 300px; }
        #viewport { width: 100vw; height: 100vh; cursor: crosshair; }
        #scene { position: absolute; transform-origin: 0 0; }
        canvas { background: white; image-rendering: pixelated; box-shadow: 0 0 100px #000; }
        .ui { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--panel); padding: 10px 25px; border-radius: 100px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--accent); z-index: 100; }
        input[type="color"] { width: 40px; height: 40px; cursor: pointer; border: 2px solid white; border-radius: 50%; background: none; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        #adminPanel { position: fixed; top: 20px; right: 20px; display: none; background: var(--panel); padding: 15px; border: 1px solid var(--accent); border-radius: 12px; z-index: 200; width: 220px; }
        .admin-tools { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .tool-btn { flex: 1; padding: 10px; background: #1e1b4b; border: 1px solid var(--accent); color: white; cursor: pointer; border-radius: 6px; font-size: 11px; min-width: 90px; }
        .tool-btn.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .btn-main { width: 100%; padding: 14px; background: var(--accent); border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <h2 style="color:var(--accent); margin-bottom: 25px;">Pixel Battle 400x400</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()" class="btn-main">В БОЙ</button>
        <p id="error" style="color: #ef4444; font-size: 13px; margin-top: 15px;"></p>
    </div>
</div>

<div id="adminPanel">
    <div style="color:var(--accent); font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px;">👑 Панель Zopik_qq</div>
    <div class="admin-tools">
        <button class="tool-btn active" id="btnBrush" onclick="setTool('brush')">🖌 Кисть</button>
        <button class="tool-btn" id="btnEraser" onclick="setTool('eraser')">🧽 Стирачка</button>
        <button class="tool-btn" onclick="adminFill()" style="border-color: #4ade80;">🧪 Заливка</button>
        <button class="tool-btn" onclick="confirmClear()" style="border-color: #ef4444;">💥 Очистить</button>
    </div>
</div>

<div id="viewport"><div id="scene"><canvas id="canvas"></canvas></div></div>

<div class="ui">
    <div id="coords" style="font-family:monospace; color:var(--accent); font-weight: bold;">X:0 Y:0</div>
    <input type="color" id="colorPicker" value="#a855f7">
    <div id="myUser" style="font-size:13px; font-weight:bold; color: #4ade80; border-left: 1px solid #444; padding-left: 15px;">...</div>
</div>

<script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scene = document.getElementById('scene');
    
    const GRID = 400, P_SIZE = 20;
    canvas.width = canvas.height = GRID * P_SIZE;

    let myNick = "";
    let currentTool = 'brush';
    let lastX = -1, lastY = -1;

    let targetScale = 0.12, targetX = window.innerWidth/2 - (canvas.width * 0.12)/2, targetY = window.innerHeight/2 - (canvas.height * 0.12)/2;
    let currentScale = targetScale, currentX = targetX, currentY = targetY;

    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        socket.emit('auth', { username, password });
    }

    socket.on('auth_success', (data) => {
        myNick = data.username;
        document.getElementById('myUser').innerText = myNick;
        document.getElementById('authOverlay').style.opacity = '0';
        setTimeout(() => document.getElementById('authOverlay').remove(), 500);
        if(data.isAdmin) document.getElementById('adminPanel').style.display = 'block';
    });

    socket.on('auth_error', (msg) => {
        document.getElementById('error').innerText = msg;
    });

    socket.on('init_board', (board) => {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let key in board) {
            const [x, y] = key.split(',').map(Number);
            ctx.fillStyle = board[key];
            ctx.fillRect(x * P_SIZE, y * P_SIZE, P_SIZE, P_SIZE);
        }
    });

    socket.on('pixel_update', (data) => {
        ctx.fillStyle = data.color;
        ctx.fillRect(data.x * P_SIZE, data.y * P_SIZE, P_SIZE, P_SIZE);
    });

    function setTool(tool) {
        currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        if(tool === 'brush') document.getElementById('btnBrush').classList.add('active');
        if(tool === 'eraser') document.getElementById('btnEraser').classList.add('active');
    }

    function adminFill() {
        const color = document.getElementById('colorPicker').value;
        if(confirm(`Залить всё поле цветом ${color}?`)) socket.emit('admin_fill', color);
    }

    function confirmClear() {
        if(confirm("Удалить прогресс из БД?")) socket.emit('admin_clear');
    }

    function paint(cx, cy) {
        if(!myNick) return;
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((cx - rect.left) / (P_SIZE * currentScale));
        const y = Math.floor((cy - rect.top) / (P_SIZE * currentScale));

        if (x >= 0 && x < GRID && y >= 0 && y < GRID && (x !== lastX || y !== lastY)) {
            lastX = x; lastY = y;
            let color = (currentTool === 'eraser') ? 'erase' : document.getElementById('colorPicker').value;
            socket.emit('paint', { x, y, color });
        }
    }

    function animate() {
        currentScale += (targetScale - currentScale) * 0.15;
        currentX += (targetX - currentX) * 0.15;
        currentY += (targetY - currentY) * 0.15;
        scene.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
        requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('mousedown', (e) => { 
        if(e.button === 0) paint(e.clientX, e.clientY); 
    });

    window.addEventListener('mousemove', (e) => {
        if(e.buttons === 1) paint(e.clientX, e.clientY);
        if(e.buttons === 4 || (e.buttons === 1 && e.altKey)) { 
            targetX += e.movementX; targetY += e.movementY; 
        }
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (P_SIZE * currentScale));
        const y = Math.floor((e.clientY - rect.top) / (P_SIZE * currentScale));
        if (x >= 0 && x < GRID && y >= 0 && y < GRID) document.getElementById('coords').innerText = `X:${x} Y:${y}`;
    });

    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.15 : 0.85;
        const sX = (e.clientX - targetX) / targetScale;
        const sY = (e.clientY - targetY) / targetScale;
        targetScale = Math.min(Math.max(0.05, targetScale * delta), 15);
        targetX = e.clientX - sX * targetScale;
        targetY = e.clientY - sY * targetScale;
    }, { passive: false });
</script>
</body>
</html>
